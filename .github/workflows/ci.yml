name: ci

on:
  pull_request:
  push:
    branches: [main]
    tags: ['v*']

jobs:
  docs-and-install:
    name: docs and installer
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Check docs and installer syntax
        run: scripts/docs-check.sh
      - name: Dry-run installer
        run: OINO_DRY_RUN=1 sh scripts/install.sh
      - name: Smoke-test local installer
        run: scripts/install-smoke.sh

  windows-installer:
    name: windows installer dry-run
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
      - name: Parse PowerShell installer
        shell: pwsh
        run: |
          $errors = $null
          $null = [System.Management.Automation.PSParser]::Tokenize((Get-Content -Raw scripts/install.ps1), [ref]$errors)
          if ($errors) { $errors | Format-List; exit 1 }
      - name: Dry-run PowerShell installer
        shell: pwsh
        run: |
          $env:OINO_DRY_RUN = '1'
          ./scripts/install.ps1

  rust:
    name: rust checks
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - name: Format
        run: cargo fmt --all -- --check
      - name: Check
        run: cargo check --workspace
      - name: Test
        run: cargo test --workspace

  release-binaries:
    name: release binary (${{ matrix.target }})
    if: startsWith(github.ref, 'refs/tags/v')
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            target: x86_64-unknown-linux-gnu
            bin: oino
          - os: macos-13
            target: x86_64-apple-darwin
            bin: oino
          - os: macos-14
            target: aarch64-apple-darwin
            bin: oino
          - os: windows-latest
            target: x86_64-pc-windows-msvc
            bin: oino.exe
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - name: Build release binary
        run: cargo build --release -p oino-app --bin oino
      - name: Stage release binary
        shell: bash
        run: |
          mkdir -p dist
          suffix=""
          if [ "${{ matrix.bin }}" = "oino.exe" ]; then suffix=".exe"; fi
          cp "target/release/${{ matrix.bin }}" "dist/oino-${{ matrix.target }}${suffix}"
      - uses: actions/upload-artifact@v4
        with:
          name: oino-${{ matrix.target }}
          path: dist/*

  release-assets:
    name: release manifest and assets
    if: startsWith(github.ref, 'refs/tags/v')
    needs: release-binaries
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
      - uses: actions/download-artifact@v4
        with:
          path: dist/artifacts
          merge-multiple: true
      - name: Bundle extension packages
        run: |
          tar -czf dist/oino-extension-bundles.tar.gz extensions/built-in extensions/additional
      - name: Generate checksums and release manifest
        env:
          TAG: ${{ github.ref_name }}
          REPO: ${{ github.repository }}
        run: |
          cd dist
          sha256sum oino-* > checksums.txt
          python3 - <<'PY'
          import hashlib, json, os
          from pathlib import Path
          tag = os.environ['TAG']
          repo = os.environ['REPO']
          base = f"https://github.com/{repo}/releases/download/{tag}"
          artifacts = []
          for path in sorted(Path('.').glob('oino-*')):
              if path.name == 'oino-extension-bundles.tar.gz':
                  continue
              target = path.name.removeprefix('oino-').removesuffix('.exe')
              artifacts.append({
                  'target': target,
                  'kind': 'binary',
                  'url': f"{base}/{path.name}",
                  'sha256': hashlib.sha256(path.read_bytes()).hexdigest(),
                  'size': path.stat().st_size,
              })
          bundle = Path('oino-extension-bundles.tar.gz')
          manifest = {
              'tag': tag,
              'version': tag.removeprefix('v'),
              'artifacts': artifacts,
              'source': {'url': f"https://github.com/{repo}/archive/refs/tags/{tag}.tar.gz"},
              'extensions': {
                  'url': f"{base}/{bundle.name}",
                  'sha256': hashlib.sha256(bundle.read_bytes()).hexdigest(),
                  'built_in_root': 'extensions/built-in',
                  'additional_root': 'extensions/additional',
              },
          }
          Path('release-manifest.json').write_text(json.dumps(manifest, indent=2, sort_keys=True) + '\n')
          PY
      - uses: softprops/action-gh-release@v2
        with:
          files: |
            dist/oino-*
            dist/checksums.txt
            dist/release-manifest.json
