[tasks.dev]
description = "Run the Oino TUI app"
run = "cargo run -p oino-app --bin oino"

[tasks."tui:render-test"]
description = "Run the Ratatui markdown rendering proof-of-concept"
run = "cargo run -p oino-tui --bin render-test"

[tasks."podman:up"]
description = "Build Oino, start/reuse the disposable Podman tmux sandbox, and attach"
run = "./scripts/podman-test.sh up"

[tasks."podman:start"]
description = "Start/reuse the disposable Podman sandbox without attaching"
run = "./scripts/podman-test.sh start"

[tasks."podman:attach"]
description = "Attach to the sandbox tmux session, creating the sandbox if needed"
run = "./scripts/podman-test.sh attach"

[tasks."podman:shell"]
description = "Open a bash shell in the disposable Podman sandbox"
run = "./scripts/podman-test.sh shell"

[tasks."podman:reset"]
description = "Clear and reinitialize the sandbox /workspace project"
run = "./scripts/podman-test.sh reset"

[tasks."podman:binary"]
description = "Build the Oino binary mounted into the Podman sandbox"
run = "./scripts/podman-test.sh binary"

[tasks."podman:image"]
description = "Build the Podman sandbox image with tmux and test utilities"
run = "./scripts/podman-test.sh image"

[tasks."podman:status"]
description = "Show disposable Podman sandbox status"
run = "./scripts/podman-test.sh status"

[tasks."podman:clean"]
description = "Remove the disposable Podman sandbox container, volumes, and image"
run = "./scripts/podman-test.sh clean"

[tasks.check]
description = "Check the full Rust workspace"
run = "cargo check --workspace"

[tasks.fmt]
description = "Format the workspace"
run = "cargo fmt --all"

[tasks.fmt-check]
description = "Verify Rust formatting"
run = "cargo fmt --all -- --check"

[tasks.lint]
description = "Run clippy with workspace warnings denied"
run = "cargo clippy --workspace --all-targets -- -D warnings"

[tasks.test]
description = "Run all workspace tests"
run = "cargo test --workspace"

[tasks.doc]
description = "Build workspace docs without dependencies"
run = "cargo doc --workspace --no-deps"

[tasks.quality]
description = "Run the standard Oino quality gate"
run = [
  "cargo fmt --all -- --check",
  "cargo clippy --workspace --all-targets -- -D warnings",
  "cargo test --workspace",
  "cargo doc --workspace --no-deps",
]
